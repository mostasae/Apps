<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Domino Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --surface2: #242424;
    --accent: #f0e040;
    --accent2: #ffe860;
    --dim: #555;
    --text: #f0f0f0;
    --text-dim: #666;
    --green: #4ade80;
    --red: #f87171;
    --border: rgba(240,224,64,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }

  body {
    background: var(--bg);
    font-family: 'DM Mono', monospace;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    overflow-x: hidden;
  }

  .app {
    width: 100%;
    max-width: 430px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* ── STATUS BAR ── */
  .status-bar {
    display: flex;
    justify-content: space-between;
    padding: 14px 24px 0;
    font-size: 12px;
    font-weight: 500;
    opacity: 0.7;
    flex-shrink: 0;
  }

  /* ── HEADER ── */
  .header {
    padding: 16px 24px 12px;
    flex-shrink: 0;
  }
  .header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 30px;
    font-weight: 800;
    letter-spacing: -0.04em;
    color: var(--accent2);
    line-height: 1;
  }
  .header p {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* ── SCORE BAR ── */
  .score-bar {
    margin: 0 16px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 14px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .score-item { text-align: center; }
  .score-val {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--accent2);
    line-height: 1;
    transition: transform 0.2s ease;
  }
  .score-val.bump { transform: scale(1.3); }
  .score-lbl {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .score-divider {
    width: 1px;
    height: 36px;
    background: var(--border);
  }

  /* ── VIEWFINDER ── */
  .viewfinder-wrap {
    margin: 0 16px 12px;
    position: relative;
    border-radius: 20px;
    overflow: hidden;
    background: #111;
    aspect-ratio: 4/3;
    flex-shrink: 0;
  }

  #videoEl {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  #canvasEl { display: none; }

  /* Corner brackets */
  .bracket {
    position: absolute;
    width: 28px;
    height: 28px;
    z-index: 4;
    pointer-events: none;
  }
  .bracket.tl { top: 12px; left: 12px; border-top: 2.5px solid var(--accent); border-left: 2.5px solid var(--accent); border-radius: 4px 0 0 0; }
  .bracket.tr { top: 12px; right: 12px; border-top: 2.5px solid var(--accent); border-right: 2.5px solid var(--accent); border-radius: 0 4px 0 0; }
  .bracket.bl { bottom: 12px; left: 12px; border-bottom: 2.5px solid var(--accent); border-left: 2.5px solid var(--accent); border-radius: 0 0 0 4px; }
  .bracket.br { bottom: 12px; right: 12px; border-bottom: 2.5px solid var(--accent); border-right: 2.5px solid var(--accent); border-radius: 0 0 4px 0; }

  /* Scan line animation */
  .scan-line {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    z-index: 3;
    opacity: 0;
    pointer-events: none;
  }
  .scan-line.active {
    animation: scanMove 1.6s ease-in-out infinite;
    opacity: 1;
  }
  @keyframes scanMove {
    0% { top: 10%; }
    50% { top: 88%; }
    100% { top: 10%; }
  }

  /* Camera off overlay */
  .cam-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    z-index: 2;
    gap: 12px;
  }
  .cam-icon {
    font-size: 40px;
    opacity: 0.3;
  }
  .cam-hint {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* Result overlay */
  .result-overlay {
    position: absolute;
    inset: 0;
    background: rgba(10,10,10,0.88);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 5;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
    gap: 8px;
  }
  .result-overlay.visible {
    opacity: 1;
    pointer-events: all;
  }
  .result-big {
    font-family: 'Syne', sans-serif;
    font-size: 72px;
    font-weight: 800;
    color: var(--accent2);
    line-height: 1;
    letter-spacing: -0.04em;
  }
  .result-label {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  .result-detail {
    font-size: 13px;
    color: var(--text);
    margin-top: 4px;
  }
  .result-actions {
    display: flex;
    gap: 10px;
    margin-top: 12px;
  }
  .btn-small {
    padding: 10px 20px;
    border-radius: 50px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    letter-spacing: 0.06em;
    transition: transform 0.1s, opacity 0.1s;
  }
  .btn-small:active { transform: scale(0.93); }
  .btn-confirm {
    background: var(--accent);
    color: #000;
    font-weight: 700;
  }
  .btn-discard {
    background: var(--surface2);
    color: var(--text-dim);
    border: 1px solid rgba(255,255,255,0.08);
  }

  /* ── CONTROLS ── */
  .controls {
    padding: 0 16px;
    display: flex;
    gap: 10px;
    flex-shrink: 0;
    margin-bottom: 12px;
  }
  .btn-cam {
    flex: 1;
    padding: 16px;
    border-radius: 16px;
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: transform 0.12s, opacity 0.12s;
  }
  .btn-cam:active { transform: scale(0.96); }
  .btn-cam:disabled { opacity: 0.4; }

  .btn-start {
    background: var(--accent);
    color: #000;
    font-weight: 700;
    box-shadow: 0 0 24px rgba(240,224,64,0.2);
  }
  .btn-shoot {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .btn-reset-all {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid rgba(255,255,255,0.08);
    flex: 0 0 auto;
    padding: 16px 18px;
  }

  /* ── HISTORY ── */
  .history-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 0 16px 32px;
  }
  .history-hdr {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .history-list { display: flex; flex-direction: column; gap: 8px; }

  .history-card {
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 14px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: fadeUp 0.22s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .h-thumb {
    width: 52px;
    height: 40px;
    border-radius: 8px;
    object-fit: cover;
    background: var(--surface2);
    flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .h-thumb-placeholder {
    width: 52px;
    height: 40px;
    border-radius: 8px;
    background: var(--surface2);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    opacity: 0.4;
  }

  .h-info { flex: 1; }
  .h-breakdown { font-size: 11px; color: var(--text-dim); margin-bottom: 2px; }
  .h-total { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 800; color: var(--text); }

  .h-pts {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    color: var(--accent2);
    flex-shrink: 0;
  }

  .h-del {
    background: none;
    border: none;
    color: var(--dim);
    font-size: 20px;
    cursor: pointer;
    padding: 4px;
    line-height: 1;
    transition: color 0.12s;
    flex-shrink: 0;
  }
  .h-del:hover { color: var(--red); }

  .empty-state {
    text-align: center;
    padding: 24px 0;
    color: var(--text-dim);
    font-size: 12px;
    letter-spacing: 0.08em;
  }

  /* ── LOADING SPINNER ── */
  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid rgba(240,224,64,0.15);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
    margin: 0 auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── STATUS PILL ── */
  .status-pill {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    white-space: nowrap;
    z-index: 4;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  ::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<div class="app">

  <div class="status-bar">
    <span>9:41</span>
    <span>●●●● WiFi 🔋</span>
  </div>

  <div class="header">
    <h1>DOMINO SCAN</h1>
    <p>AI Dot Counter</p>
  </div>

  <!-- Score Bar -->
  <div class="score-bar">
    <div class="score-item">
      <div class="score-val" id="totalScore">0</div>
      <div class="score-lbl">Total Score</div>
    </div>
    <div class="score-divider"></div>
    <div class="score-item">
      <div class="score-val" id="tileCount">0</div>
      <div class="score-lbl">Tiles</div>
    </div>
    <div class="score-divider"></div>
    <div class="score-item">
      <div class="score-val" id="lastScore">—</div>
      <div class="score-lbl">Last Tile</div>
    </div>
  </div>

  <!-- Viewfinder -->
  <div class="viewfinder-wrap" id="viewfinderWrap">
    <video id="videoEl" autoplay playsinline muted></video>
    <canvas id="canvasEl"></canvas>

    <!-- Corner brackets -->
    <div class="bracket tl"></div>
    <div class="bracket tr"></div>
    <div class="bracket bl"></div>
    <div class="bracket br"></div>

    <div class="scan-line" id="scanLine"></div>

    <!-- Camera placeholder -->
    <div class="cam-placeholder" id="camPlaceholder">
      <div class="cam-icon">📷</div>
      <div class="cam-hint">Tap Start Camera</div>
    </div>

    <!-- Result overlay -->
    <div class="result-overlay" id="resultOverlay">
      <div class="result-label">Dots Counted</div>
      <div class="result-big" id="resultBig">—</div>
      <div class="result-detail" id="resultDetail"></div>
      <div id="resultLoading" style="display:none"><div class="spinner"></div></div>
      <div class="result-actions" id="resultActions" style="display:none">
        <button class="btn-small btn-discard" id="btnDiscard">Retake</button>
        <button class="btn-small btn-confirm" id="btnConfirm">+ Add Score</button>
      </div>
    </div>

    <div class="status-pill" id="statusPill">Ready</div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn-cam btn-start" id="btnCamera">Start Camera</button>
    <button class="btn-cam btn-shoot" id="btnShoot" disabled>📸 Scan</button>
    <button class="btn-cam btn-reset-all" id="btnReset" title="Reset all">↺</button>
  </div>

  <!-- History -->
  <div class="history-wrap">
    <div class="history-hdr">Scanned Tiles</div>
    <div class="history-list" id="historyList">
      <div class="empty-state">No tiles scanned yet</div>
    </div>
  </div>

</div>

<script>
  // ── STATE ──
  let stream = null;
  let cameraActive = false;
  let currentCapture = null; // { dataUrl, dots, left, right }
  let history = [];
  let totalScore = 0;

  // ── ELEMENTS ──
  const videoEl = document.getElementById('videoEl');
  const canvasEl = document.getElementById('canvasEl');
  const btnCamera = document.getElementById('btnCamera');
  const btnShoot = document.getElementById('btnShoot');
  const btnReset = document.getElementById('btnReset');
  const camPlaceholder = document.getElementById('camPlaceholder');
  const scanLine = document.getElementById('scanLine');
  const resultOverlay = document.getElementById('resultOverlay');
  const resultBig = document.getElementById('resultBig');
  const resultDetail = document.getElementById('resultDetail');
  const resultLoading = document.getElementById('resultLoading');
  const resultActions = document.getElementById('resultActions');
  const btnConfirm = document.getElementById('btnConfirm');
  const btnDiscard = document.getElementById('btnDiscard');
  const statusPill = document.getElementById('statusPill');
  const historyList = document.getElementById('historyList');
  const totalScoreEl = document.getElementById('totalScore');
  const tileCountEl = document.getElementById('tileCount');
  const lastScoreEl = document.getElementById('lastScore');

  // ── CAMERA ──
  btnCamera.addEventListener('click', async () => {
    if (cameraActive) {
      stopCamera();
    } else {
      await startCamera();
    }
  });

  async function startCamera() {
    try {
      setStatus('Starting camera…');
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 960 } },
        audio: false
      });
      videoEl.srcObject = stream;
      await videoEl.play();
      cameraActive = true;
      camPlaceholder.style.display = 'none';
      scanLine.classList.add('active');
      btnCamera.textContent = 'Stop Camera';
      btnCamera.style.background = 'var(--surface2)';
      btnCamera.style.color = 'var(--text-dim)';
      btnCamera.style.border = '1px solid rgba(255,255,255,0.1)';
      btnShoot.disabled = false;
      setStatus('Point at a domino tile');
    } catch (e) {
      setStatus('Camera access denied');
      console.error(e);
      alert('Camera permission is required. Please allow camera access and try again.');
    }
  }

  function stopCamera() {
    if (stream) {
      stream.getTracks().forEach(t => t.stop());
      stream = null;
    }
    videoEl.srcObject = null;
    cameraActive = false;
    camPlaceholder.style.display = '';
    scanLine.classList.remove('active');
    btnCamera.textContent = 'Start Camera';
    btnCamera.style.background = '';
    btnCamera.style.color = '';
    btnCamera.style.border = '';
    btnShoot.disabled = true;
    hideResult();
    setStatus('Ready');
  }

  // ── CAPTURE ──
  btnShoot.addEventListener('click', captureAndAnalyze);

  async function captureAndAnalyze() {
    if (!cameraActive) return;

    // Capture frame
    canvasEl.width = videoEl.videoWidth || 640;
    canvasEl.height = videoEl.videoHeight || 480;
    const ctx = canvasEl.getContext('2d');
    ctx.drawImage(videoEl, 0, 0);
    const dataUrl = canvasEl.toDataURL('image/jpeg', 0.85);
    const base64 = dataUrl.split(',')[1];

    // Show loading overlay
    showLoading();
    setStatus('Analyzing…');
    btnShoot.disabled = true;

    try {
      const result = await analyzeDomino(base64);
      currentCapture = { dataUrl, ...result };
      showResult(result);
      setStatus('Tap "+ Add Score" to confirm');
    } catch (e) {
      console.error(e);
      hideResult();
      setStatus('Analysis failed — try again');
      btnShoot.disabled = false;
    }
  }

  // ── CLAUDE VISION API ──
  async function analyzeDomino(base64) {
    const prompt = `You are analyzing an image of a single domino tile.

Your task:
1. Count the total number of black dots (pips) visible on the domino.
2. Identify dots on the LEFT half and dots on the RIGHT half (separated by the center dividing line).
3. If the domino is oriented vertically, treat top as "left" and bottom as "right".

Respond ONLY with a valid JSON object in exactly this format (no markdown, no explanation):
{"left": <number>, "right": <number>, "total": <number>, "notes": "<brief observation>"}

Rules:
- Only count actual pips (dots) on the domino tile.
- If you cannot see a domino clearly, return {"left": 0, "right": 0, "total": 0, "notes": "No domino detected"}
- Numbers must be integers between 0 and 6.`;

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 200,
        messages: [{
          role: 'user',
          content: [
            {
              type: 'image',
              source: { type: 'base64', media_type: 'image/jpeg', data: base64 }
            },
            { type: 'text', text: prompt }
          ]
        }]
      })
    });

    if (!response.ok) throw new Error(`API error ${response.status}`);
    const data = await response.json();
    const raw = data.content.find(b => b.type === 'text')?.text || '';
    const clean = raw.replace(/```json|```/g, '').trim();
    return JSON.parse(clean);
  }

  // ── RESULT UI ──
  function showLoading() {
    resultOverlay.classList.add('visible');
    resultBig.textContent = '';
    resultDetail.textContent = '';
    resultLoading.style.display = 'block';
    resultActions.style.display = 'none';
  }

  function showResult(result) {
    resultLoading.style.display = 'none';
    resultBig.textContent = result.total;
    resultDetail.textContent = `Left: ${result.left}  ·  Right: ${result.right}`;
    if (result.notes) resultDetail.textContent += `\n${result.notes}`;
    resultActions.style.display = 'flex';
    btnShoot.disabled = false;
  }

  function hideResult() {
    resultOverlay.classList.remove('visible');
    currentCapture = null;
  }

  // ── CONFIRM / DISCARD ──
  btnConfirm.addEventListener('click', () => {
    if (!currentCapture) return;
    const { dataUrl, left, right, total } = currentCapture;
    addToHistory({ dataUrl, left, right, total });
    totalScore += total;
    updateScoreBar(total);
    hideResult();
    setStatus('Added! Point at next tile');
  });

  btnDiscard.addEventListener('click', () => {
    hideResult();
    setStatus('Retake — point at a domino');
  });

  // ── SCORE BAR ──
  function updateScoreBar(last) {
    totalScoreEl.textContent = totalScore;
    tileCountEl.textContent = history.length;
    lastScoreEl.textContent = last !== undefined ? last : '—';
    [totalScoreEl, tileCountEl, lastScoreEl].forEach(el => {
      el.classList.add('bump');
      setTimeout(() => el.classList.remove('bump'), 250);
    });
  }

  // ── HISTORY ──
  function addToHistory(entry) {
    history.unshift({ ...entry, id: Date.now() });
    renderHistory();
  }

  function removeFromHistory(id) {
    const idx = history.findIndex(h => h.id === id);
    if (idx !== -1) {
      totalScore -= history[idx].total;
      history.splice(idx, 1);
      renderHistory();
      updateScoreBar();
    }
  }

  function renderHistory() {
    if (history.length === 0) {
      historyList.innerHTML = '<div class="empty-state">No tiles scanned yet</div>';
      return;
    }
    historyList.innerHTML = history.map(h => `
      <div class="history-card">
        <img class="h-thumb" src="${h.dataUrl}" alt="tile" onerror="this.style.display='none'">
        <div class="h-info">
          <div class="h-breakdown">${h.left} + ${h.right}</div>
          <div class="h-total">${h.total} dots</div>
        </div>
        <div class="h-pts">${h.total}</div>
        <button class="h-del" onclick="removeFromHistory(${h.id})">×</button>
      </div>
    `).join('');
  }

  // ── RESET ──
  btnReset.addEventListener('click', () => {
    if (!confirm('Reset all scores and tiles?')) return;
    history = [];
    totalScore = 0;
    currentCapture = null;
    hideResult();
    renderHistory();
    totalScoreEl.textContent = '0';
    tileCountEl.textContent = '0';
    lastScoreEl.textContent = '—';
    setStatus('Reset — ready');
  });

  // ── STATUS ──
  function setStatus(msg) {
    statusPill.textContent = msg;
  }
</script>
</body>
</html>
